<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ SEO Title (keyword-rich) -->
  <title>Delin | Frontend Developer (React, Next.js, UI Engineer)</title>

  <!-- ✅ Meta Description -->
  <meta 
    name="description" 
    content="Delin is a frontend developer specializing in React, Next.js, and high-performance UI development. Explore projects, case studies, and professional work." 
  />

  <!-- ✅ Open Graph (for sharing) -->
  <meta property="og:title" content="Delin | Frontend Developer" />
  <meta property="og:description" content="React & UI Engineer Portfolio with real-world projects." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourportfolio.com" />

  <!-- ✅ Favicon -->
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- ✅ Font Preload (performance) -->
  <link 
    rel="preload" 
    href="/fonts/SpaceGrotesk.woff2" 
    as="font" 
    type="font/woff2" 
    crossorigin
  />

  <!-- ✅ Structured Data (SEO understanding) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Delin",
    "jobTitle": "Frontend Developer",
    "url": "https://delin.vercel.app",
    "sameAs": [
      "https://github.com/DelinB",
      "https://www.linkedin.com/in/delin-b-dev"
    ]
  }
  </script>

</head>

<body>
  <div id="root"></div>

  <!-- React App -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
