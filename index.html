  <!-- 🔥 CRITICAL CSS for Loading State -->
  <style>
    /* * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    } */
    
    /* body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    } */
    
    /* Loading Skeleton - Shows until React loads */
    #root {
      min-height: 100vh;
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 2rem;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-title {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    
    .loading-text {
      opacity: 0.9;
      font-size: 1rem;
    }
    
    /* Skip to content for accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: white;
      color: black;
      padding: 8px;
      z-index: 100;
      text-decoration: none;
      border-radius: 4px;
    }
    
    .skip-link:focus {
      top: 0;
    }
    
    /* Screen reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
  </style>
</head>

<body>

  <!-- 🔥 FALLBACK: Remove loading state when React mounts -->
  <script>
    // Remove loading container when React is ready
    window.addEventListener('load', function() {

        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('loading-container')) {

    });
