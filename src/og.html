<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image</title>

<style>
    @font-face {
    font-family: 'Space Grotesk';
    src: url('/fonts/SpaceGrotesk-VariableFont_wght.ttf') format('truetype');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
  }


  body {
    margin: 0;
    background: #020617;
    font-family: Inter, system-ui, -apple-system, sans-serif;
  }

  .canvas {
    width: 1200px;
    height: 630px;
    position: relative;
    padding: 80px;
    box-sizing: border-box;
    background: radial-gradient(circle at top right, rgba(56,189,248,0.12), transparent 40%), #020617;
    color: white;
    overflow: hidden;
  }

  /* Subtle grid (reduced noise) */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(#1e293b 1px, transparent 1px),
      linear-gradient(to right, #1e293b 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.08;
  }

  .content {
    position: relative;
    z-index: 2;
    max-width: 800px;
  }

  /* NAME */
  .name {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -1px;
    text-shadow: 0 0 20px rgba(56,189,248,0.25);
  }

  /* ROLE */
  .role {
    margin-top: 12px;
    font-size: 26px;
    font-weight: 500;
    background: linear-gradient(90deg, #38bdf8, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* PROOF (MOST IMPORTANT) */
  .proof {
    margin-top: 32px;
    font-size: 34px;
    font-weight: 700;
    color: #38bdf8;
    line-height: 1.2;
  }

  /* TECH STACK */
  .tech {
    margin-top: 20px;
    font-size: 18px;
    color: #94a3b8;
    letter-spacing: 0.5px;
  }

  /* FOOTER BRAND */
  .footer {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 16px;
    color: #64748b;
  }

  /* OPTIONAL LIGHT ACCENT */
  .accent {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(56,189,248,0.15), transparent 60%);
  }

</style>
</head>

<body>
  <div class="canvas">

    <div class="grid"></div>
    <div class="accent"></div>

    <div class="content">
      <div class="name">Delin</div>

      <div class="role">
        Performance Frontend Engineer
      </div>

      <div class="proof">
        95+ Lighthouse Performance Web Apps
      </div>

      <div class="tech">
        React • Next.js • Performance UI
      </div>
    </div>

    <div class="footer">
      delin.vercel.app
    </div>

  </div>
</body>
</html>
